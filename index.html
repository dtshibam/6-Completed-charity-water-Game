<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Quest - charity: water</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

  <div class="container">
    <header>
      <img src="img/cw_logo.png" alt="charity water logo" class="logo">
      <h1>Water Quest</h1>
      
      <div class="difficulty-section">
        <label for="difficulty">Difficulty:</label>
        <select id="difficulty">
          <option value="easy">Easy (15 Cans / 45s)</option>
          <option value="normal" selected>Normal (20 Cans / 30s)</option>
          <option value="hard">Hard (35 Cans / 20s)</option>
        </select>
      </div>
    </header>

    <div class="stats">
      <div class="stat-item"><p>Cans Collected</p><span id="current-cans">0</span></div>
      <div class="stat-item"><p>Time Left</p><span id="timer">30</span>s</div>
    </div>

    <div id="achievements" class="achievement-message"></div>

    <div class="game-grid"></div>

    <button id="start-game">Start Game</button>

    <footer class="cw-footer">
      <hr>
      <p>Clean water changes everything.</p>
      <div class="footer-links">
        <a href="https://www.charitywater.org" target="_blank">Our Mission</a> | 
        <a href="https://www.charitywater.org/donate" target="_blank">Donate Now</a>
      </div>
    </footer>
  </div>

  <audio id="collect-sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
